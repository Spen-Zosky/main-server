<!DOCTYPE html>
<html>
<head><title>Grafico Claude</title></head>
<body>
<canvas id="grafico"></canvas>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
const ctx = document.getElementById('grafico').getContext('2d');
new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['Prompt 1'],
    datasets: [{ label: 'Lunghezza risposta', data: [42] }]
  }
});
</script>
</body>
</html>
